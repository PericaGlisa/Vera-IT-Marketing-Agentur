<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- Overlay gradient for depth -->
    <radialGradient id="overlayGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </radialGradient>
    
    <!-- Accent gradient circles -->
    <radialGradient id="accentGradient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="accentGradient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
    
    <radialGradient id="accentGradient3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#mainGradient)" />
  
  <!-- Overlay for depth -->
  <rect width="1200" height="630" fill="url(#overlayGradient)" />
  
  <!-- Decorative circles for visual interest -->
  <circle cx="200" cy="150" r="120" fill="url(#accentGradient1)" opacity="0.6" />
  <circle cx="1000" cy="480" r="180" fill="url(#accentGradient2)" opacity="0.5" />
  <circle cx="600" cy="100" r="80" fill="url(#accentGradient3)" opacity="0.7" />
  <circle cx="900" cy="200" r="60" fill="url(#accentGradient1)" opacity="0.4" />
  <circle cx="300" cy="500" r="100" fill="url(#accentGradient2)" opacity="0.3" />
  
  <!-- Subtle geometric shapes for modern tech feel -->
  <polygon points="100,400 200,350 200,450" fill="#ffffff" opacity="0.05" />
  <polygon points="1000,100 1100,50 1100,150" fill="#ffffff" opacity="0.08" />
  <rect x="50" y="50" width="80" height="80" rx="10" fill="#ffffff" opacity="0.04" />
  <rect x="1070" y="550" width="60" height="60" rx="8" fill="#ffffff" opacity="0.06" />
</svg>